<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" width="580">
  <defs>
    <style>
      @font-face {
        font-family: 'Lora';
        src: url('data:font/truetype;base64,') format('truetype');
        font-weight: 700;
      }
      .f { font-family: 'Lora', Georgia, serif; }
      .m { font-family: 'Courier New', monospace; }
    </style>

    <clipPath id="c0"><rect x="0" y="0" width="0" height="180"><animate attributeName="width" from="0" to="580" dur="0.4s" begin="0.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="c1"><rect x="0" y="0" width="0" height="180"><animate attributeName="width" from="0" to="580" dur="0.4s" begin="0.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="c2"><rect x="0" y="0" width="0" height="180"><animate attributeName="width" from="0" to="580" dur="0.6s" begin="1.1s" fill="freeze"/></rect></clipPath>
    <clipPath id="c3"><rect x="0" y="0" width="0" height="180"><animate attributeName="width" from="0" to="580" dur="0.4s" begin="1.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="c4"><rect x="0" y="0" width="0" height="180"><animate attributeName="width" from="0" to="580" dur="0.4s" begin="2.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="c5"><rect x="0" y="0" width="0" height="180"><animate attributeName="width" from="0" to="580" dur="0.4s" begin="2.6s" fill="freeze"/></rect></clipPath>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="580" height="180" fill="#060d0a"/>

  <!-- Subtle horizontal grid -->
  <line x1="0" y1="90" x2="580" y2="90" stroke="#091a12" stroke-width="0.5"/>

  <!-- Corner L-brackets -->
  <polyline points="10,30 10,10 30,10" fill="none" stroke="#00ff88" stroke-width="1.2"/>
  <polyline points="550,10 570,10 570,30" fill="none" stroke="#00ff88" stroke-width="1.2"/>
  <polyline points="10,150 10,170 30,170" fill="none" stroke="#00ff88" stroke-width="1.2"/>
  <polyline points="550,170 570,170 570,150" fill="none" stroke="#00ff88" stroke-width="1.2"/>

  <!-- Top scan line -->
  <g clip-path="url(#c0)">
    <line x1="24" y1="28" x2="556" y2="28" stroke="#00ff88" stroke-width="0.6" filter="url(#glow-soft)"/>
  </g>

  <!-- THE — small, spaced -->
  <g clip-path="url(#c1)">
    <text x="290" y="54" class="f" font-size="11" font-weight="700" fill="#00aa55"
          text-anchor="middle" letter-spacing="14">T H E</text>
  </g>

  <!-- CASCADIAN — large calligraphic with glow ghost -->
  <g clip-path="url(#c2)">
    <text x="293" y="112" class="f" font-size="46" font-weight="700" fill="none"
          text-anchor="middle" stroke="#003322" stroke-width="1" letter-spacing="4">CASCADIAN</text>
    <text x="290" y="110" class="f" font-size="46" font-weight="700" fill="#00ff88"
          text-anchor="middle" letter-spacing="4" filter="url(#glow)">CASCADIAN</text>
  </g>

  <!-- Divider with centre tick -->
  <g clip-path="url(#c3)">
    <line x1="24" y1="126" x2="210" y2="126" stroke="#003322" stroke-width="0.6"/>
    <line x1="370" y1="126" x2="556" y2="126" stroke="#003322" stroke-width="0.6"/>
    <rect x="274" y="121" width="32" height="10" fill="none" stroke="#003322" stroke-width="0.6"/>
  </g>

  <!-- Subtitle -->
  <g clip-path="url(#c4)">
    <text x="290" y="146" class="m" font-size="8.5" fill="#00aa55"
          text-anchor="middle" letter-spacing="3">DEV · MODDER · MUSICIAN · PNW</text>
  </g>

  <!-- Bottom scan line + cursor -->
  <g clip-path="url(#c5)">
    <line x1="24" y1="158" x2="556" y2="158" stroke="#00ff88" stroke-width="0.6" filter="url(#glow-soft)"/>
    <rect x="24" y="162" width="7" height="10" fill="#00ff88">
      <animate attributeName="opacity" values="0;1;1;0" dur="0.9s" begin="2.9s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>